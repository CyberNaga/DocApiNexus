name: Container Publish and Signing

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  OWNER: cybernaga

jobs:
  publish-and-sign:
    name: Publish and sign Docker images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rest-api
            path: backend/rest-api
            image: docapinexus-rest-api
          - name: graphql-api
            path: backend/graphql-api
            image: docapinexus-graphql-api
          - name: auth-service
            path: backend/microservices/auth-service
            image: docapinexus-auth-service
          - name: audit-service
            path: backend/microservices/audit-service
            image: docapinexus-audit-service
          - name: api-gateway
            path: backend/api-gateway
            image: docapinexus-api-gateway
          - name: web-app
            path: web-app
            image: docapinexus-web-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:latest
            ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Sign Docker image with Cosign
        run: |
          cosign sign --yes ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}

      - name: Verify Docker image signature
        run: |
          cosign verify ghcr.io/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }} \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"