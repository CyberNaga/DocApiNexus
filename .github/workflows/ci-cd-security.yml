name: DocApiNexus CI/CD Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  node-security-checks:
    name: Node.js Services Security Checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - backend/rest-api
          - backend/graphql-api
          - backend/microservices/auth-service
          - web-app
          - backend/api-gateway
          - backend/microservices/audit-service

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test

      - name: Run npm audit
        working-directory: ${{ matrix.service }}
        run: npm audit --audit-level=moderate || true

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      security-events: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build-scan:
    name: Docker Build and Image Scan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: rest-api
            path: backend/rest-api
            image: docapinexus-rest-api

          - name: graphql-api
            path: backend/graphql-api
            image: docapinexus-graphql-api

          - name: auth-service
            path: backend/microservices/auth-service
            image: docapinexus-auth-service

          - name: web-app
            path: web-app
            image: docapinexus-web-app

          - name: api-gateway
            path: backend/api-gateway
            image: docapinexus-api-gateway

          - name: audit-service
            path: backend/microservices/audit-service
            image: docapinexus-audit-service
  
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ matrix.image }}:ci ./${{ matrix.path }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

   
  kubernetes-security-scan:
    name: Kubernetes YAML Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Trivy Kubernetes config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./k8s
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Kubernetes scan
        run: checkov -d k8s --framework kubernetes --soft-fail
  sbom-generation:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rest-api
            path: backend/rest-api
          - name: graphql-api
            path: backend/graphql-api
          - name: auth-service
            path: backend/microservices/auth-service
          - name: audit-service
            path: backend/microservices/audit-service
          - name: api-gateway
            path: backend/api-gateway
          - name: web-app
            path: web-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate CycloneDX SBOM
        working-directory: ${{ matrix.path }}
        run: |
          npm install
          npx @cyclonedx/cyclonedx-npm --output-reproducible --output-format JSON --output-file sbom-${{ matrix.name }}.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: ${{ matrix.path }}/sbom-${{ matrix.name }}.json

  semgrep-sast:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        run: |
          semgrep scan \
            --config p/ci \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/nodejs \
            --sarif \
            --output semgrep-results.sarif \
            --no-error

      - name: Upload Semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-results
          path: semgrep-results.sarif

      - name: Upload Semgrep results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

  trivy-docker-sarif:
    name: Trivy Docker SARIF Upload
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rest-api
            path: backend/rest-api
            image: docapinexus-rest-api
          - name: graphql-api
            path: backend/graphql-api
            image: docapinexus-graphql-api
          - name: auth-service
            path: backend/microservices/auth-service
            image: docapinexus-auth-service
          - name: audit-service
            path: backend/microservices/audit-service
            image: docapinexus-audit-service
          - name: api-gateway
            path: backend/api-gateway
            image: docapinexus-api-gateway
          - name: web-app
            path: web-app
            image: docapinexus-web-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ matrix.image }}:ci ${{ matrix.path }}

      - name: Run Trivy Docker image scan in SARIF format
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:ci
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.name }}-sarif
          path: trivy-${{ matrix.name }}.sarif

      - name: Upload Trivy results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-docker-${{ matrix.name }}

  trivy-kubernetes-sarif:
    name: Trivy Kubernetes SARIF Upload
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy Kubernetes config scan in SARIF format
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./k8s
          format: sarif
          output: trivy-kubernetes.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Upload Kubernetes Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-kubernetes-sarif
          path: trivy-kubernetes.sarif

      - name: Upload Kubernetes Trivy results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-kubernetes.sarif
          category: trivy-kubernetes-config

  container-publish-sign:
    name: Publish and Sign Docker Images
    runs-on: ubuntu-latest

    needs:
      - node-security-checks
      - secret-scan
      - docker-build-scan
      - kubernetes-security-scan
      - sbom-generation
      - semgrep-sast
      - trivy-docker-sarif
      - trivy-kubernetes-sarif

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rest-api
            path: backend/rest-api
            image: docapinexus-rest-api
          - name: graphql-api
            path: backend/graphql-api
            image: docapinexus-graphql-api
          - name: auth-service
            path: backend/microservices/auth-service
            image: docapinexus-auth-service
          - name: audit-service
            path: backend/microservices/audit-service
            image: docapinexus-audit-service
          - name: api-gateway
            path: backend/api-gateway
            image: docapinexus-api-gateway
          - name: web-app
            path: web-app
            image: docapinexus-web-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          tags: |
            ghcr.io/cybernaga/${{ matrix.image }}:latest
            ghcr.io/cybernaga/${{ matrix.image }}:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image digest with Cosign
        run: |
          cosign sign --yes ghcr.io/cybernaga/${{ matrix.image }}@${{ steps.build.outputs.digest }}

      - name: Verify Docker image signature
        run: |
          cosign verify ghcr.io/cybernaga/${{ matrix.image }}@${{ steps.build.outputs.digest }} \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

  api-security-tests:
    name: Automated API Security Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Compose stack
        run: |
          docker compose up -d --build
          sleep 30

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Newman API2 security tests
        run: |
          npx newman run security-testing/api-pentest/postman/DocApiNexus_API2_Broken_Authentication.postman_collection.json \
            -e security-testing/api-pentest/postman/DocApiNexus_Local.postman_environment.json \
            --reporters cli,json \
            --reporter-json-export api2-broken-authentication-report.json

      - name: Upload Newman API security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api2-broken-authentication-newman-report
          path: api2-broken-authentication-report.json

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down