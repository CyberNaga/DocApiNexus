name: DocApiNexus CI/CD Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  node-security-checks:
    name: Node.js Services Security Checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - backend/rest-api
          - backend/graphql-api
          - backend/microservices/auth-service
          - web-app
          - backend/api-gateway
          - backend/microservices/audit-service

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test

      - name: Run npm audit
        working-directory: ${{ matrix.service }}
        run: npm audit --audit-level=moderate || true

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2

  docker-build-scan:
    name: Docker Build and Image Scan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: rest-api
            path: backend/rest-api
            image: docapinexus-rest-api

          - name: graphql-api
            path: backend/graphql-api
            image: docapinexus-graphql-api

          - name: auth-service
            path: backend/microservices/auth-service
            image: docapinexus-auth-service

          - name: web-app
            path: web-app
            image: docapinexus-web-app

          - name: api-gateway
            path: backend/api-gateway
            image: docapinexus-api-gateway

          - name: audit-service
            path: backend/microservices/audit-service
            image: docapinexus-audit-service
  
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ matrix.image }}:ci ./${{ matrix.path }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

   
  kubernetes-security-scan:
    name: Kubernetes YAML Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Trivy Kubernetes config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./k8s
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Kubernetes scan
        run: checkov -d k8s --framework kubernetes --soft-fail
  sbom-generation:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rest-api
            path: backend/rest-api
          - name: graphql-api
            path: backend/graphql-api
          - name: auth-service
            path: backend/microservices/auth-service
          - name: audit-service
            path: backend/microservices/audit-service
          - name: api-gateway
            path: backend/api-gateway
          - name: web-app
            path: web-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate CycloneDX SBOM
        working-directory: ${{ matrix.path }}
        run: |
          npm install
          npx @cyclonedx/cyclonedx-npm --output-reproducible --output-format JSON --output-file sbom-${{ matrix.name }}.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: ${{ matrix.path }}/sbom-${{ matrix.name }}.json

  semgrep-sast:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        run: |
          semgrep scan \
            --config p/ci \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/nodejs \
            --sarif \
            --output semgrep-results.sarif \
            --no-error

      - name: Upload Semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-results
          path: semgrep-results.sarif

      - name: Upload Semgrep results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

  trivy-docker-sarif:
    name: Trivy Docker SARIF Upload
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rest-api
            path: backend/rest-api
            image: docapinexus-rest-api
          - name: graphql-api
            path: backend/graphql-api
            image: docapinexus-graphql-api
          - name: auth-service
            path: backend/microservices/auth-service
            image: docapinexus-auth-service
          - name: audit-service
            path: backend/microservices/audit-service
            image: docapinexus-audit-service
          - name: api-gateway
            path: backend/api-gateway
            image: docapinexus-api-gateway
          - name: web-app
            path: web-app
            image: docapinexus-web-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ matrix.image }}:ci ${{ matrix.path }}

      - name: Run Trivy Docker image scan in SARIF format
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:ci
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.name }}-sarif
          path: trivy-${{ matrix.name }}.sarif

      - name: Upload Trivy results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-docker-${{ matrix.name }}

  trivy-kubernetes-sarif:
    name: Trivy Kubernetes SARIF Upload
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy Kubernetes config scan in SARIF format
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./k8s
          format: sarif
          output: trivy-kubernetes.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Upload Kubernetes Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-kubernetes-sarif
          path: trivy-kubernetes.sarif

      - name: Upload Kubernetes Trivy results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-kubernetes.sarif
          category: trivy-kubernetes-config