name: docapinexus

services:
  postgres:
    image: postgres:16
    container_name: docapinexus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: docapinexusdb
      POSTGRES_USER: docapiuser
      POSTGRES_PASSWORD: DocApi@123
    volumes:
      - docapinexus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docapiuser -d docapinexusdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - docapinexus-network

  db-migration:
    build:
      context: .
      dockerfile: database/Dockerfile
    container_name: docapinexus-db-migration
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: docapinexusdb
      DB_USER: docapiuser
      DB_PASSWORD: DocApi@123
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - docapinexus-network

  auth-service:
    build:
      context: ./backend/microservices/auth-service
    container_name: docapinexus-auth-service
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: docapinexus_local_secret_change_later
      JWT_EXPIRES_IN: 1h
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: docapinexusdb
      DB_USER: docapiuser
      DB_PASSWORD: DocApi@123
    depends_on:
      db-migration:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - docapinexus-network

  rest-api:
    build:
      context: ./backend/rest-api
    container_name: docapinexus-rest-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: docapinexus_local_secret_change_later
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: docapinexusdb
      DB_USER: docapiuser
      DB_PASSWORD: DocApi@123
    depends_on:
      db-migration:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - docapinexus-network

  graphql-api:
    build:
      context: ./backend/graphql-api
    container_name: docapinexus-graphql-api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: docapinexus_local_secret_change_later
    depends_on:
      auth-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - docapinexus-network

  audit-service:
    build:
      context: ./backend/microservices/audit-service
    container_name: docapinexus-audit-service
    ports:
      - "6000:6000"
    environment:
      PORT: 6000
      JWT_SECRET: docapinexus_local_secret_change_later
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: docapinexusdb
      DB_USER: docapiuser
      DB_PASSWORD: DocApi@123
    depends_on:
      db-migration:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - docapinexus-network

  api-gateway:
    build:
      context: ./backend/api-gateway
    container_name: docapinexus-api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:5000
      REST_API_URL: http://rest-api:3000
      GRAPHQL_API_URL: http://graphql-api:4000
      AUDIT_SERVICE_URL: http://audit-service:6000
    depends_on:
      auth-service:
        condition: service_started
      rest-api:
        condition: service_started
      graphql-api:
        condition: service_started
      audit-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - docapinexus-network

  web-app:
    build:
      context: ./web-app
    container_name: docapinexus-web-app
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_started
    restart: unless-stopped
    networks:
      - docapinexus-network

  prometheus:
    image: prom/prometheus:latest
    container_name: docapinexus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/prometheus/alerts.yaml:/etc/prometheus/alerts.yaml
    depends_on:
      api-gateway:
        condition: service_started
      auth-service:
        condition: service_started
      rest-api:
        condition: service_started
      graphql-api:
        condition: service_started
      audit-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - docapinexus-network

  grafana:
    image: grafana/grafana:latest
    container_name: docapinexus-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - docapinexus-grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    networks:
      - docapinexus-network

networks:
  docapinexus-network:
    driver: bridge

volumes:
  docapinexus-postgres-data:
  docapinexus-grafana-data: