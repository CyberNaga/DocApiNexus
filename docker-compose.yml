services:
  auth-service:
    build:
      context: ./backend/microservices/auth-service
    container_name: docapinexus-auth-service
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: docapinexus_local_secret_change_later
      JWT_EXPIRES_IN: 1h
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: docapinexusdb
      DB_USER: docapiuser
      DB_PASSWORD: DocApi@123

  rest-api:
    build:
      context: ./backend/rest-api
    container_name: docapinexus-rest-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: docapinexus_local_secret_change_later
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: docapinexusdb
      DB_USER: docapiuser
      DB_PASSWORD: DocApi@123
    depends_on:
      - auth-service

  graphql-api:
    build:
      context: ./backend/graphql-api
    container_name: docapinexus-graphql-api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: docapinexus_local_secret_change_later
    depends_on:
      - auth-service

  web-app:
    build:
      context: ./web-app
    container_name: docapinexus-web-app
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - rest-api
      - graphql-api

  api-gateway:
    build:
      context: ./backend/api-gateway
    container_name: docapinexus-api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:5000
      REST_API_URL: http://rest-api:3000
      GRAPHQL_API_URL: http://graphql-api:4000
    depends_on:
      - auth-service
      - rest-api
      - graphql-api

  audit-service:
    build:
      context: ./backend/microservices/audit-service
    container_name: docapinexus-audit-service
    ports:
      - "6000:6000"
    environment:
      PORT: 6000
      JWT_SECRET: docapinexus_local_secret_change_later
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: docapinexusdb
      DB_USER: docapiuser
      DB_PASSWORD: DocApi@123