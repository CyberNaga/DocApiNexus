apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-api
  namespace: docapinexus
spec:
  securityContext:
        seccompProfile:
          type: RuntimeDefault
  replicas: 1
  selector:
    matchLabels:
      app: graphql-api
  template:
    metadata:
      labels:
        app: graphql-api
    spec:
      containers:
        - name: graphql-api
          image: docapinexus-graphql-api:latest
          imagePullPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 4000
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            failureThreshold: 30
            periodSeconds: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: PORT
              value: "4000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: docapinexus-secrets
                  key: JWT_SECRET

---
apiVersion: v1
kind: Service
metadata:
  name: graphql-api
  namespace: docapinexus
spec:
  selector:
    app: graphql-api
  ports:
    - port: 4000
      targetPort: 4000