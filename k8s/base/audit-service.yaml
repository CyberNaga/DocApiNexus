apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: docapinexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: audit-service
          image: docapinexus-audit-service:latest
          imagePullPolicy: Never

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          ports:
            - containerPort: 6000

          startupProbe:
            httpGet:
              path: /health
              port: 6000
            failureThreshold: 30
            periodSeconds: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 6000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 6000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          env:
            - name: PORT
              value: "6000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: docapinexus-secrets
                  key: JWT_SECRET
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: docapinexus-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: docapinexus-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docapinexus-secrets
                  key: DB_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: docapinexus
spec:
  selector:
    app: audit-service
  ports:
    - port: 6000
      targetPort: 6000