apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: docapinexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: docapinexus-web-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173

---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: docapinexus
spec:
  selector:
    app: web-app
  ports:
    - port: 5173
      targetPort: 5173