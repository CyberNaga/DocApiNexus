apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: docapinexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: api-gateway
          image: docapinexus-api-gateway:latest
          imagePullPolicy: Never

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          ports:
            - containerPort: 8080

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          env:
            - name: PORT
              value: "8080"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5000"
            - name: REST_API_URL
              value: "http://rest-api:3000"
            - name: GRAPHQL_API_URL
              value: "http://graphql-api:4000"
            - name: AUDIT_SERVICE_URL
              value: "http://audit-service:6000"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: docapinexus
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080